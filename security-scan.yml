name: DSVW Security Scan

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install app dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Install scanners
        run: |
          pip install pip-audit bandit

      - name: Dependency scan with pip-audit
        run: |
          pip-audit -r requirements.txt -f json -o pip-audit-report.json || true

      - name: Static code scan with Bandit
        run: |
          bandit -r . -f json -o bandit-report.json || true

      - name: Show quick summary
        run: |
          echo "=== pip-audit ==="
          cat pip-audit-report.json || true
          echo "=== bandit ==="
          cat bandit-report.json || true

      - name: Upload scan reports
        uses: actions/upload-artifact@v4
        with:
          name: dsvw-security-reports
          path: |
            pip-audit-report.json
            bandit-report.json
